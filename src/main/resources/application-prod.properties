## Database Configuration for Aiven MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&verifyServerCertificate=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

## Specify the database driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## Spring Boot Production Configuration
spring.jpa.hibernate.ddl-auto=update
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.html
spring.web.resources.cache.enabled=false